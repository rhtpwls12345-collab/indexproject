<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>자기소개 미니 프로젝트</title>
    <link rel="stylesheet" href="profile.css" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
  </head>
  <body>
    <form>
      <main>
        <section class="profilepage2">
          <div class="introduction bg-white bg-opacity-75 p-4 rounded-3 shadow-sm d-inline-block w-100" style="max-width: 800px;">
            <div class="card mb-3 w-100" style="max-width: 100%">
              <div class="row g-0">
                <div class="col-md-4">
                  <img
                    src="profilepic.jpg"
                    class="img-fluid rounded-start"
                    alt="profile pic"
                  />
                </div>
                <div class="col-md-8">
                  <div class="card-body">
                    <h2 class="card-title"><strong>기본 정보</strong></h2>
                    <br /><br />
                    <!-- 후에 윗줄 css 로 수정 -->
                    <div class="tablebox">
                      <table
                        border="3"
                        class="table table-bordered border-primary"
                      >
                        <tr class="fs-4">
                          <td class="p-4">이름</td>
                          <td class="p-4">고세진</td>
                        </tr>
                        <tr class="fs-4">
                          <td class="p-4">생년월일</td>
                          <td class="p-4">1997.02.14</td>
                        </tr>
                        <tr class="fs-4">
                          <td class="p-4">MBTI</td>
                          <td class="p-4">ENFJ</td>
                        </tr>
                        <tr class="fs-4">
                          <td class="p-4">특징</td>
                          <td class="p-4">긍정적,낙관적</td>
                        </tr>
                      </table>
                    </div>
                  </div>
                </div>
              </div>
            </div>
            <div class="btn-group w-100" role="group">
              <a
                class="btn btn-outline-primary btn-lg d-grid col-6 mx-auto"
                href="profile.html"
                role="button"
                >뒤로</a
              >
              <a
                class="btn btn-outline-primary btn-lg d-grid col-6 mx-auto "
                href="profile3.html"
                role="button"
                >다음</a
              >
            </div>
          </div>
        </section>
      </main>
    </form>
  </body>
</html>
